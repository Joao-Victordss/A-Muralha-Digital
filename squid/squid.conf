visible_hostname muralha-squid

http_port 3128
ftp_port 2121 ftp-track-dirs

pid_filename /tmp/squid.pid
access_log stdio:/var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
cache_store_log none
cache deny all
happy_eyeballs_connect_limit 0

acl localhost src 127.0.0.1/32 ::1
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl exception_clients src "/etc/squid/allowed_ips.txt"

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 21
acl Safe_ports port 443
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

acl content_block_words url_regex -i sexo sexy playboy imagens

acl ftp_proxy myportname 2121
acl ftp_over_http proto FTP
acl ftp_upload method PUT
acl ftp_download method GET
acl pdf_by_path urlpath_regex -i \.pdf([/?#]|$)
acl txt_by_path urlpath_regex -i \.txt([/?#]|$)
acl stor_pdf req_header FTP-Command -i ^STOR$
acl stor_pdf_arg req_header FTP-Arguments -i \.pdf$
acl retr_txt req_header FTP-Command -i ^RETR$
acl retr_txt_arg req_header FTP-Arguments -i \.txt$

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Excecao da Tarefa A: o IP listado ignora apenas o filtro de conteudo.
http_access allow exception_clients content_block_words
http_access deny content_block_words

# Tarefa B via ftp:// no proxy HTTP e via proxy FTP nativo.
http_access deny ftp_over_http ftp_upload pdf_by_path
http_access deny ftp_over_http ftp_download txt_by_path
http_access deny ftp_proxy stor_pdf stor_pdf_arg
http_access deny ftp_proxy retr_txt retr_txt_arg

http_access allow localhost
http_access allow localnet
http_access deny all

ftp_passive on
